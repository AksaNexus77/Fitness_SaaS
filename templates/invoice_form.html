{% extends "base.html" %}

{% block title %}Create Invoice - FitZone{% endblock %}

{% block content %}
<div class="page-container">
    <div class="page-header">
        <div class="header-content">
            <a href="{{ url_for('invoices') }}" class="back-link">
                <i class="fas fa-arrow-left"></i>
                Back to Invoices
            </a>
            <h1>Create Invoice</h1>
            <p>Generate a new invoice for a member</p>
        </div>
    </div>

    <form method="POST" class="form-container-wide">
        <div class="form-section">
            <h3>Invoice Details</h3>
            <div class="form-grid">
                <div class="form-group">
                    <label for="member_id">Member *</label>
                    <select id="member_id" name="member_id" required>
                        <option value="">Select Member</option>
                        {% for member in members %}
                        <option value="{{ member.id }}">{{ member.user.first_name }} {{ member.user.last_name }} - {{ member.user.email }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="amount">Amount ($) *</label>
                    <input type="number" step="0.01" id="amount" name="amount" required onchange="calculateTotal()">
                </div>
                <div class="form-group">
                    <label for="due_date">Due Date</label>
                    <input type="date" id="due_date" name="due_date">
                </div>
                <div class="form-group full-width">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" rows="3" placeholder="Enter invoice description..."></textarea>
                </div>
            </div>
        </div>

        <div class="invoice-preview">
            <h3>Invoice Preview</h3>
            <div class="preview-row">
                <span>Subtotal:</span>
                <span id="subtotal">$0.00</span>
            </div>
            <div class="preview-row">
                <span>Tax (10%):</span>
                <span id="tax">$0.00</span>
            </div>
            <div class="preview-row total">
                <span>Total:</span>
                <span id="total">$0.00</span>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i>
                <span>Create Invoice</span>
            </button>
            <a href="{{ url_for('invoices') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

<script>
function calculateTotal() {
    const amount = parseFloat(document.getElementById('amount').value) || 0;
    const tax = amount * 0.1;
    const total = amount + tax;
    
    document.getElementById('subtotal').textContent = '$' + amount.toFixed(2);
    document.getElementById('tax').textContent = '$' + tax.toFixed(2);
    document.getElementById('total').textContent = '$' + total.toFixed(2);
}
</script>
{% endblock %}
