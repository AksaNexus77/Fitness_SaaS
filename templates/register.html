{% extends "base.html" %}

{% block auth_content %}
<div class="login-container">
    <div class="login-split">
        <!-- Left Panel - Branding -->
        <div class="login-brand-panel">
            <div class="brand-content">
                <div class="logo-large">
                    <i class="fas fa-dumbbell"></i>
                    <h1>FitZone</h1>
                </div>
                <p class="tagline">Join Our Fitness Community</p>
                <div class="feature-list">
                    <div class="feature-item">
                        <i class="fas fa-user-plus"></i>
                        <span>Create Your Profile</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-dumbbell"></i>
                        <span>Track Your Workouts</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-chart-line"></i>
                        <span>Monitor Progress</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-calendar-check"></i>
                        <span>Book Sessions</span>
                    </div>
                </div>
            </div>
            <div class="brand-decoration">
                <div class="circle circle-1"></div>
                <div class="circle circle-2"></div>
                <div class="circle circle-3"></div>
            </div>
        </div>

        <!-- Right Panel - Register Form -->
        <div class="login-form-panel">
            <div class="form-container">
                <div class="form-header">
                    <h2>Create Account</h2>
                    <p>Start your fitness journey today</p>
                </div>

                <form method="POST" action="{{ url_for('register') }}" class="login-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="first_name">
                                <i class="fas fa-user"></i>
                                First Name
                            </label>
                            <div class="input-wrapper">
                                <input type="text" id="first_name" name="first_name" required 
                                       placeholder="First name">
                                <i class="fas fa-user input-icon"></i>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="last_name">
                                <i class="fas fa-user"></i>
                                Last Name
                            </label>
                            <div class="input-wrapper">
                                <input type="text" id="last_name" name="last_name" required 
                                       placeholder="Last name">
                                <i class="fas fa-user input-icon"></i>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email">
                            <i class="fas fa-envelope"></i>
                            Email Address
                        </label>
                        <div class="input-wrapper">
                            <input type="email" id="email" name="email" required 
                                   placeholder="Enter your email">
                            <i class="fas fa-envelope input-icon"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="phone">
                            <i class="fas fa-phone"></i>
                            Phone Number
                        </label>
                        <div class="input-wrapper">
                            <input type="tel" id="phone" name="phone" 
                                   placeholder="Enter your phone number (optional)">
                            <i class="fas fa-phone input-icon"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="role">
                            <i class="fas fa-user-tag"></i>
                            Account Type
                        </label>
                        <div class="input-wrapper">
                            <select id="role" name="role" class="form-select">
                                <option value="member">Member</option>
                                <option value="trainer">Trainer</option>
                            </select>
                            <i class="fas fa-chevron-down input-icon"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">
                            <i class="fas fa-lock"></i>
                            Password
                        </label>
                        <div class="input-wrapper">
                            <input type="password" id="password" name="password" required 
                                   placeholder="Create a password">
                            <i class="fas fa-lock input-icon"></i>
                            <button type="button" class="toggle-password" onclick="togglePassword()">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn-login">
                        <span>Create Account</span>
                        <i class="fas fa-user-plus"></i>
                    </button>
                </form>

                <div class="form-footer">
                    <p>Already have an account? <a href="{{ url_for('login') }}">Sign In</a></p>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.form-select {
    width: 100%;
    padding: 16px 16px 16px 50px;
    border: 2px solid #e0e0e0;
    border-radius: 12px;
    font-size: 15px;
    transition: all 0.3s ease;
    background: #f8f9fa;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
}

.form-select:focus {
    outline: none;
    border-color: #667eea;
    background: #fff;
    box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
}

@media (max-width: 480px) {
    .form-row {
        grid-template-columns: 1fr;
    }
}
</style>

<script>
function togglePassword() {
    const passwordInput = document.getElementById('password');
    const toggleBtn = document.querySelector('.toggle-password i');
    
    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleBtn.classList.remove('fa-eye');
        toggleBtn.classList.add('fa-eye-slash');
    } else {
        passwordInput.type = 'password';
        toggleBtn.classList.remove('fa-eye-slash');
        toggleBtn.classList.add('fa-eye');
    }
}

document.addEventListener('DOMContentLoaded', function() {
    const formPanel = document.querySelector('.login-form-panel');
    formPanel.style.opacity = '0';
    formPanel.style.transform = 'translateX(30px)';
    
    setTimeout(() => {
        formPanel.style.transition = 'all 0.6s ease';
        formPanel.style.opacity = '1';
        formPanel.style.transform = 'translateX(0)';
    }, 100);
});
</script>
{% endblock %}
