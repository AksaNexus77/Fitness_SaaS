{% extends "base.html" %}

{% block title %}Add Progress - FitZone{% endblock %}

{% block content %}
<div class="page-container">
    <div class="page-header">
        <div class="header-content">
            <a href="{{ url_for('progress') }}" class="back-link">
                <i class="fas fa-arrow-left"></i>
                Back to Progress
            </a>
            <h1>Add Progress Record</h1>
            <p>Track member fitness measurements</p>
        </div>
    </div>

    <form method="POST" class="form-container-wide">
        <div class="form-section">
            <h3>Member & Date</h3>
            <div class="form-grid">
                <div class="form-group">
                    <label for="member_id">Member *</label>
                    <select id="member_id" name="member_id" required>
                        <option value="">Select Member</option>
                        {% for member in members %}
                        <option value="{{ member.id }}">{{ member.user.first_name }} {{ member.user.last_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="record_date">Date *</label>
                    <input type="date" id="record_date" name="record_date" required value="{{ today }}">
                </div>
            </div>
        </div>

        <div class="form-section">
            <h3>Body Measurements</h3>
            <div class="form-grid">
                <div class="form-group">
                    <label for="weight">Weight (kg)</label>
                    <input type="number" step="0.1" id="weight" name="weight">
                </div>
                <div class="form-group">
                    <label for="body_fat_percentage">Body Fat %</label>
                    <input type="number" step="0.1" id="body_fat_percentage" name="body_fat_percentage">
                </div>
                <div class="form-group">
                    <label for="chest">Chest (cm)</label>
                    <input type="number" step="0.1" id="chest" name="chest">
                </div>
                <div class="form-group">
                    <label for="waist">Waist (cm)</label>
                    <input type="number" step="0.1" id="waist" name="waist">
                </div>
                <div class="form-group">
                    <label for="hips">Hips (cm)</label>
                    <input type="number" step="0.1" id="hips" name="hips">
                </div>
                <div class="form-group">
                    <label for="biceps">Biceps (cm)</label>
                    <input type="number" step="0.1" id="biceps" name="biceps">
                </div>
                <div class="form-group">
                    <label for="thighs">Thighs (cm)</label>
                    <input type="number" step="0.1" id="thighs" name="thighs">
                </div>
            </div>
        </div>

        <div class="form-section">
            <h3>Notes</h3>
            <div class="form-group full-width">
                <textarea id="notes" name="notes" rows="4" placeholder="Add any notes about this progress record..."></textarea>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i>
                <span>Save Progress</span>
            </button>
            <a href="{{ url_for('progress') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
